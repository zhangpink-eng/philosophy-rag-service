<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oscar 哲学对话</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* 顶栏 */
        .topbar {
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-shrink: 0;
        }
        .topbar h1 {
            color: #e94560;
            font-size: 1.1rem;
            margin: 0;
        }
        .topbar .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-left: auto;
        }
        .topbar label {
            color: #666;
            font-size: 0.75rem;
        }
        .topbar select {
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 6px;
            color: #e0e0e0;
            padding: 4px 8px;
            font-size: 0.8rem;
        }
        .topbar select:focus { outline: none; border-color: #e94560; }

        /* 主对话区 */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 0;
        }
        .chat-area::-webkit-scrollbar { width: 6px; }
        .chat-area::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }

        /* 消息气泡 */
        .msg {
            max-width: 75%;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
        }
        .msg.oscar { align-self: flex-start; }
        .msg.user { align-self: flex-end; }

        .bubble {
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 0.88rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .msg.oscar .bubble {
            background: #16213e;
            border: 1px solid #0f3460;
            border-bottom-left-radius: 4px;
            color: #d0d0d0;
        }
        .msg.user .bubble {
            background: #e94560;
            border-bottom-right-radius: 4px;
            color: white;
        }
        .speaker-label {
            font-size: 0.65rem;
            margin-bottom: 3px;
            color: #555;
            padding: 0 4px;
        }
        .msg.oscar .speaker-label { color: #e94560; align-self: flex-start; }
        .msg.user .speaker-label { color: #4a9eff; align-self: flex-end; }

        /* 输入区 */
        .input-area {
            background: #16213e;
            border-top: 1px solid #0f3460;
            padding: 14px 20px;
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-shrink: 0;
        }
        .input-area textarea {
            flex: 1;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 12px;
            color: #e0e0e0;
            padding: 10px 14px;
            font-size: 0.88rem;
            resize: none;
            min-height: 44px;
            max-height: 120px;
            font-family: inherit;
        }
        .input-area textarea:focus { outline: none; border-color: #e94560; }
        .input-area textarea::placeholder { color: #555; }

        .btn-send {
            width: 56px;
            height: 44px;
            background: #e94560;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }
        .btn-send:hover { background: #d63850; }
        .btn-send:disabled { background: #555; cursor: not-allowed; }

        /* 状态 */
        .status-bar {
            background: #0d1b2a;
            border-top: 1px solid #0f3460;
            padding: 6px 20px;
            font-size: 0.7rem;
            color: #555;
            display: flex;
            gap: 20px;
            flex-shrink: 0;
        }
        .status-bar span { color: #0f9; }

        /* 等待动画 */
        .thinking {
            align-self: flex-start;
            margin-bottom: 16px;
            color: #555;
            font-size: 0.8rem;
            padding: 10px 14px;
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 14px;
            border-bottom-left-radius: 4px;
        }
        .thinking::after {
            content: '';
            display: inline-block;
            width: 4px;
            height: 4px;
            background: #555;
            border-radius: 50%;
            margin-left: 6px;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <h1>Oscar</h1>
    <div class="controls">
        <label>LLM</label>
        <select id="providerSelect">
            <option value="minimax" selected>MiniMax</option>
            <option value="deepseek">DeepSeek</option>
        </select>
        <label>场景</label>
        <select id="scenarioSelect">
            <option value="consultation" selected>咨询</option>
            <option value="supervision">督导</option>
            <option value="workshop">工作坊</option>
        </select>
    </div>
</div>

<div class="chat-area" id="chatArea">
    <div class="msg oscar" id="startPrompt">
        <div class="speaker-label">Oscar</div>
        <div class="bubble">点击下方按钮，Oscar 将开始一段哲学对话。</div>
    </div>
</div>

<div class="input-area">
    <textarea id="userInput" rows="1" placeholder="输入你的回复..."></textarea>
    <button class="btn-send" id="sendBtn" onclick="sendMessage()">▶</button>
</div>

<div class="status-bar">
    <div>Session: <span id="sessionDisplay">—</span></div>
    <div>轮次: <span id="turnDisplay">0</span></div>
</div>

<script>
    let sessionId = null;
    let conversationHistory = [];
    let isFirst = true;
    let isLoading = false;

    const chatArea = document.getElementById('chatArea');
    const userInput = document.getElementById('userInput');

    // 自动高度
    userInput.addEventListener('input', () => {
        userInput.style.height = 'auto';
        userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
    });

    // 回车发送
    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    async function sendMessage() {
        const text = userInput.value.trim();
        // 第一轮：Oscar 自动开场（页面加载时已触发）
        if (isFirst) {
            isFirst = false;
            return;
        }
        if (!text) return;

        userInput.value = '';
        userInput.style.height = 'auto';

        // 显示用户消息
        appendMsg('user', text);
        conversationHistory.push({ speaker: 'user', message: text });

        // 显示等待
        const thinkingEl = document.createElement('div');
        thinkingEl.className = 'thinking';
        thinkingEl.textContent = 'Oscar 在思考';
        chatArea.appendChild(thinkingEl);
        chatArea.scrollTop = chatArea.scrollHeight;
        document.getElementById('sendBtn').disabled = true;

        try {
            const resp = await fetch('/api/dialogue', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    query: text,
                    scenario: document.getElementById('scenarioSelect').value,
                    provider: document.getElementById('providerSelect').value,
                    session_id: sessionId,
                    is_first: false
                })
            });
            const data = await resp.json();

            thinkingEl.remove();

            if (data.session_id && !sessionId) {
                sessionId = data.session_id;
                document.getElementById('sessionDisplay').textContent = sessionId;
            }

            if (data.oscar) {
                appendMsg('oscar', data.oscar);
                conversationHistory.push({ speaker: 'oscar', message: data.oscar });
            }

            document.getElementById('turnDisplay').textContent = data.turn_count || 0;
        } catch (e) {
            thinkingEl.remove();
            appendMsg('oscar', `错误: ${e}`);
        }

        document.getElementById('sendBtn').disabled = false;
    }

    async function startFirst() {
        if (!isFirst) return;
        isFirst = false;
        document.getElementById('startPrompt').remove();

        // 显示等待
        const thinkingEl = document.createElement('div');
        thinkingEl.className = 'thinking';
        thinkingEl.textContent = 'Oscar 正在开场...';
        chatArea.appendChild(thinkingEl);
        chatArea.scrollTop = chatArea.scrollHeight;
        document.getElementById('sendBtn').disabled = true;

        try {
            const resp = await fetch('/api/dialogue', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    query: null,
                    scenario: document.getElementById('scenarioSelect').value,
                    provider: document.getElementById('providerSelect').value,
                    session_id: sessionId,
                    is_first: true
                })
            });
            const data = await resp.json();

            thinkingEl.remove();

            if (data.session_id) {
                sessionId = data.session_id;
                document.getElementById('sessionDisplay').textContent = sessionId;
            }

            if (data.oscar) {
                appendMsg('oscar', data.oscar);
                conversationHistory.push({ speaker: 'oscar', message: data.oscar });
            }

            document.getElementById('turnDisplay').textContent = data.turn_count || 0;
        } catch (e) {
            thinkingEl.remove();
            appendMsg('oscar', `错误: ${e}`);
        }

        document.getElementById('sendBtn').disabled = false;
        userInput.focus();
    }

    function appendMsg(speaker, text) {
        const div = document.createElement('div');
        div.className = `msg ${speaker}`;
        div.innerHTML = `
            <div class="speaker-label">${speaker === 'oscar' ? 'Oscar' : '你'}</div>
            <div class="bubble">${escapeHtml(text)}</div>
        `;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // 重新开始
    function resetConversation() {
        sessionId = null;
        conversationHistory = [];
        isFirst = true;
        document.getElementById('sessionDisplay').textContent = '—';
        document.getElementById('turnDisplay').textContent = '0';
        chatArea.innerHTML = `
            <div class="msg oscar">
                <div class="speaker-label">Oscar</div>
                <div class="bubble">点击下方按钮，Oscar 将开始一段哲学对话。</div>
            </div>
        `;
        userInput.value = '';
        userInput.focus();
    }

    // 页面加载时自动开场
    window.addEventListener('load', () => {
        startFirst();
    });
</script>

</body>
</html>
