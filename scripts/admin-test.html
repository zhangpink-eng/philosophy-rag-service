<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philosophia - Phase 7 管理后台</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e4e4e4;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #fff; text-align: center; margin-bottom: 30px; }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card-title {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        .card-value {
            color: #fff;
            font-size: 2rem;
            font-weight: bold;
        }
        .card-sub {
            color: #666;
            font-size: 0.85rem;
            margin-top: 8px;
        }
        .section {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h2 { color: #a5b4fc; margin-bottom: 16px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
        }
        .stat-item {
            background: rgba(0,0,0,0.2);
            padding: 16px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
        }
        .stat-label {
            font-size: 0.8rem;
            color: #888;
            margin-top: 4px;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin: 2px;
        }
        .badge.low { background: rgba(52,211,153,0.2); color: #34d399; }
        .badge.medium { background: rgba(251,191,36,0.2); color: #fbbf24; }
        .badge.high { background: rgba(249,115,22,0.2); color: #f97316; }
        .badge.crisis { background: rgba(239,68,68,0.2); color: #ef4444; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        th { color: #888; font-weight: normal; }
        tr:hover { background: rgba(255,255,255,0.02); }
        .chart-container {
            height: 200px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 16px;
            margin-top: 16px;
        }
        .chart-bar {
            display: flex;
            align-items: flex-end;
            height: 160px;
            gap: 4px;
        }
        .bar {
            flex: 1;
            background: linear-gradient(180deg, #6366f1 0%, #8b5cf6 100%);
            border-radius: 4px 4px 0 0;
            min-width: 20px;
            transition: height 0.3s;
        }
        .bar-label {
            font-size: 0.7rem;
            color: #666;
            text-align: center;
            margin-top: 4px;
        }
        button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        button:hover { transform: translateY(-2px); }
        .loading { color: #888; text-align: center; padding: 20px; }
        .error { color: #ef4444; padding: 16px; background: rgba(239,68,68,0.1); border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Phase 7 管理后台</h1>

        <div class="dashboard" id="dashboard">
            <div class="loading">加载中...</div>
        </div>

        <div class="section">
            <h2>质量趋势</h2>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="avg-depth">-</div>
                    <div class="stat-label">平均深度</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="avg-insight">-</div>
                    <div class="stat-label">平均洞察</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="avg-overall">-</div>
                    <div class="stat-label">平均综合分</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="total-evaluated">-</div>
                    <div class="stat-label">已评估会话</div>
                </div>
            </div>
            <div class="chart-container">
                <div class="chart-bar" id="trendChart"></div>
            </div>
        </div>

        <div class="section">
            <h2>安全统计</h2>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="total-checks">-</div>
                    <div class="stat-label">总检查数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="high-risk">-</div>
                    <div class="stat-label">高风险</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="medium-risk">-</div>
                    <div class="stat-label">中风险</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="crisis-count">-</div>
                    <div class="stat-label">危机检测</div>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>安全日志</h2>
            <button onclick="loadSafetyLogs()">刷新</button>
            <div id="safetyLogs" style="margin-top: 16px;"></div>
        </div>

        <div class="section">
            <h2>用户活跃度</h2>
            <div id="userActivity" style="margin-top: 16px;"></div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:8000/api/admin';

        async function loadDashboard() {
            try {
                const res = await fetch(`${API}/dashboard`);
                if (!res.ok) throw new Error('API不可用');
                const data = await res.json();

                // Session stats
                const ss = data.session_stats;
                // User stats
                const us = data.user_stats;
                // Quality stats
                const qs = data.quality_stats;
                // Safety stats
                const safs = data.safety_stats;
                // Workshop stats
                const ws = data.workshop_stats;

                document.getElementById('dashboard').innerHTML = `
                    <div class="card">
                        <div class="card-title">总会话数</div>
                        <div class="card-value">${ss.total_sessions}</div>
                        <div class="card-sub">活跃: ${ss.active_sessions}</div>
                    </div>
                    <div class="card">
                        <div class="card-title">总用户数</div>
                        <div class="card-value">${us.total_users}</div>
                        <div class="card-sub">本周新增: ${us.new_users_this_week}</div>
                    </div>
                    <div class="card">
                        <div class="card-title">综合质量分</div>
                        <div class="card-value">${qs.avg_overall_score}</div>
                        <div class="card-sub">已评估: ${qs.total_evaluated_sessions} 会话</div>
                    </div>
                    <div class="card">
                        <div class="card-title">安全检查</div>
                        <div class="card-value">${safs.total_checks}</div>
                        <div class="card-sub">危机: ${safs.crisis_detected_count}</div>
                    </div>
                    <div class="card">
                        <div class="card-title">工作坊</div>
                        <div class="card-value">${ws.total_workshops}</div>
                        <div class="card-sub">活跃: ${ws.active_workshops}</div>
                    </div>
                    <div class="card">
                        <div class="card-title">平均消息数/会话</div>
                        <div class="card-value">${ss.avg_messages_per_session}</div>
                        <div class="card-sub">总消息: ${ss.total_messages}</div>
                    </div>
                `;

                // Update quality stats
                document.getElementById('avg-depth').textContent = qs.avg_depth_score;
                document.getElementById('avg-insight').textContent = qs.avg_insight_score;
                document.getElementById('avg-overall').textContent = qs.avg_overall_score;
                document.getElementById('total-evaluated').textContent = qs.total_evaluated_sessions;

                // Update safety stats
                document.getElementById('total-checks').textContent = safs.total_checks;
                document.getElementById('high-risk').textContent = safs.high_risk_count;
                document.getElementById('medium-risk').textContent = safs.medium_risk_count;
                document.getElementById('crisis-count').textContent = safs.crisis_detected_count;

            } catch (err) {
                document.getElementById('dashboard').innerHTML = `
                    <div class="error">
                        无法连接到服务器: ${err.message}<br>
                        请确保后端服务已启动 (python main.py)
                    </div>
                `;
            }
        }

        async function loadQualityTrends() {
            try {
                const res = await fetch(`${API}/quality-trends?days=7`);
                const data = await res.json();

                const chart = document.getElementById('trendChart');
                if (!data.trends || data.trends.length === 0) {
                    chart.innerHTML = '<div class="loading">暂无数据</div>';
                    return;
                }

                const maxScore = Math.max(...data.trends.map(t => t.avg_overall));
                chart.innerHTML = data.trends.map(t => {
                    const height = maxScore > 0 ? (t.avg_overall / maxScore * 100) : 0;
                    const date = new Date(t.date).toLocaleDateString('zh-CN', {month:'short', day:'numeric'});
                    return `
                        <div>
                            <div class="bar" style="height:${height}%"></div>
                            <div class="bar-label">${date}</div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                console.error('Failed to load trends:', err);
            }
        }

        async function loadSafetyLogs() {
            try {
                const res = await fetch(`${API}/safety-logs?limit=10`);
                const data = await res.json();

                const container = document.getElementById('safetyLogs');
                if (!data.logs || data.logs.length === 0) {
                    container.innerHTML = '<div class="loading">暂无安全日志</div>';
                    return;
                }

                container.innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>风险等级</th>
                                <th>内容摘要</th>
                                <th>消息</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.logs.map(log => `
                                <tr>
                                    <td>${new Date(log.created_at).toLocaleString('zh-CN')}</td>
                                    <td><span class="badge ${log.risk_level.toLowerCase()}">${log.risk_level}</span></td>
                                    <td>${(log.user_input || '').substring(0, 50)}...</td>
                                    <td>${log.message || '-'}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (err) {
                document.getElementById('safetyLogs').innerHTML = `<div class="error">加载失败: ${err.message}</div>`;
            }
        }

        async function loadUserActivity() {
            try {
                const res = await fetch(`${API}/user-activity?days=7`);
                const data = await res.json();

                const container = document.getElementById('userActivity');
                if (!data.activity || data.activity.length === 0) {
                    container.innerHTML = '<div class="loading">暂无活跃数据</div>';
                    return;
                }

                container.innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>日期</th>
                                <th>活跃用户</th>
                                <th>新增用户</th>
                                <th>消息数</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.activity.map(a => `
                                <tr>
                                    <td>${new Date(a.date).toLocaleDateString('zh-CN')}</td>
                                    <td>${a.active_users}</td>
                                    <td>${a.new_users}</td>
                                    <td>${a.total_messages}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (err) {
                document.getElementById('userActivity').innerHTML = `<div class="error">加载失败: ${err.message}</div>`;
            }
        }

        // Initial load
        loadDashboard();
        loadQualityTrends();
        loadSafetyLogs();
        loadUserActivity();
    </script>
</body>
</html>
