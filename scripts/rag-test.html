<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philosophia RAG 测试</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e4e4e4;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2rem;
            color: #fff;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #888;
            font-size: 0.95rem;
        }

        .search-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-row {
            display: flex;
            gap: 12px;
        }

        #queryInput {
            flex: 1;
            padding: 16px 20px;
            font-size: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            outline: none;
            transition: border-color 0.3s;
        }

        #queryInput:focus {
            border-color: #6366f1;
        }

        #queryInput::placeholder {
            color: #666;
        }

        #searchBtn {
            padding: 16px 32px;
            font-size: 1rem;
            font-weight: 600;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        #searchBtn:hover {
            transform: translateY(-2px);
        }

        #searchBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .results {
            display: none;
        }

        .results.active {
            display: block;
        }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        @media (max-width: 900px) {
            .results-grid {
                grid-template-columns: 1fr;
            }
        }

        .result-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .result-card h3 {
            font-size: 1rem;
            color: #a5b4fc;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
        }

        .badge-before {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }

        .badge-after {
            background: rgba(52, 211, 153, 0.2);
            color: #34d399;
        }

        .doc-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
        }

        .doc-item {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 14px;
            border-left: 3px solid #6366f1;
        }

        .doc-item.reranked {
            border-left-color: #34d399;
            background: rgba(52, 211, 153, 0.05);
        }

        .doc-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .doc-source {
            font-size: 0.8rem;
            color: #888;
        }

        .doc-rank {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
        }

        .doc-score {
            font-size: 0.8rem;
            color: #6366f1;
            font-weight: 600;
        }

        .doc-text {
            font-size: 0.9rem;
            line-height: 1.5;
            color: #ccc;
        }

        .answer-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .answer-section h3 {
            font-size: 1.1rem;
            color: #a5b4fc;
            margin-bottom: 16px;
        }

        .answer-content {
            font-size: 1rem;
            line-height: 1.8;
            color: #e4e4e4;
            white-space: pre-wrap;
        }

        .sources-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sources-section h4 {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 12px;
        }

        .sources-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .source-item {
            display: flex;
            gap: 12px;
            font-size: 0.85rem;
            color: #999;
        }

        .source-num {
            color: #6366f1;
            font-weight: 600;
            min-width: 30px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(99, 102, 241, 0.3);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #888;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 16px;
            color: #f87171;
            margin-bottom: 20px;
            display: none;
        }

        .error.active {
            display: block;
        }

        .example-queries {
            margin-top: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .example-btn {
            padding: 8px 16px;
            font-size: 0.85rem;
            background: rgba(99, 102, 241, 0.2);
            color: #a5b4fc;
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .example-btn:hover {
            background: rgba(99, 102, 241, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Philosophia RAG 测试</h1>
            <p class="subtitle">混合检索 + 精排 + LLM生成</p>
        </header>

        <div class="search-box">
            <div class="input-row">
                <input type="text" id="queryInput" placeholder="输入你的问题..." autocomplete="off">
                <button id="searchBtn">搜索</button>
            </div>
            <div class="example-queries">
                <button class="example-btn" data-query="什么是苏格拉底式追问？">苏格拉底式追问</button>
                <button class="example-btn" data-query="如何处理工作中的焦虑情绪？">处理焦虑</button>
                <button class="example-btn" data-query="什么是章鱼策略？">章鱼策略</button>
                <button class="example-btn" data-query="哲学咨询中如何指出矛盾？">指出矛盾</button>
                <button class="example-btn" data-query="为什么人们倾向于把事情复杂化？">事情复杂化</button>
            </div>
        </div>

        <div id="error" class="error"></div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p class="loading-text">检索中...</p>
        </div>

        <div id="results" class="results">
            <div class="results-grid">
                <div class="result-card">
                    <h3>
                        检索结果（精排前）
                        <span class="badge badge-before">RRF融合</span>
                    </h3>
                    <div id="beforeRerank" class="doc-list"></div>
                </div>
                <div class="result-card">
                    <h3>
                        检索结果（精排后）
                        <span class="badge badge-after">BGE-Reranker</span>
                    </h3>
                    <div id="afterRerank" class="doc-list"></div>
                </div>
            </div>

            <div class="answer-section">
                <h3>LLM 生成回答</h3>
                <div id="answer" class="answer-content"></div>
                <div id="sources" class="sources-section" style="display: none;">
                    <h4>引用来源</h4>
                    <div id="sourcesList" class="sources-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api';

        const queryInput = document.getElementById('queryInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultsDiv = document.getElementById('results');
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');

        // Example query buttons
        document.querySelectorAll('.example-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                queryInput.value = btn.dataset.query;
                performSearch();
            });
        });

        searchBtn.addEventListener('click', performSearch);
        queryInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });

        async function performSearch() {
            const query = queryInput.value.trim();
            if (!query) return;

            // Show loading
            loadingDiv.classList.add('active');
            resultsDiv.classList.remove('active');
            errorDiv.classList.remove('active');
            searchBtn.disabled = true;

            try {
                // Step 1: Get retrieval comparison
                const compareRes = await fetch(`${API_BASE}/retrieve/compare`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });

                if (!compareRes.ok) throw new Error('检索请求失败');
                const compareData = await compareRes.json();

                // Step 2: Get answer
                const answerRes = await fetch(`${API_BASE}/query`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });

                if (!answerRes.ok) throw new Error('生成请求失败');
                const answerData = await answerRes.json();

                // Render results
                renderBeforeRerank(compareData.before_rerank);
                renderAfterRerank(compareData.after_rerank);
                renderAnswer(answerData);

                resultsDiv.classList.add('active');
            } catch (err) {
                errorDiv.textContent = `错误: ${err.message}`;
                errorDiv.classList.add('active');
            } finally {
                loadingDiv.classList.remove('active');
                searchBtn.disabled = false;
            }
        }

        function renderBeforeRerank(docs) {
            const container = document.getElementById('beforeRerank');
            container.innerHTML = docs.map((doc, i) => `
                <div class="doc-item">
                    <div class="doc-meta">
                        <span class="doc-source">${truncate(doc.source, 30)}</span>
                        <span class="doc-rank">#${i + 1}</span>
                    </div>
                    <div class="doc-text">${truncate(doc.text_zh, 120)}</div>
                    <div class="doc-score">score: ${(doc.score || 0).toFixed(4)}</div>
                </div>
            `).join('');
        }

        function renderAfterRerank(docs) {
            const container = document.getElementById('afterRerank');
            container.innerHTML = docs.map((doc, i) => `
                <div class="doc-item reranked">
                    <div class="doc-meta">
                        <span class="doc-source">${truncate(doc.source, 30)}</span>
                        <span class="doc-rank">#${i + 1}</span>
                    </div>
                    <div class="doc-text">${truncate(doc.text_zh, 120)}</div>
                    <div class="doc-score">rerank: ${(doc.rerank_score || 0).toFixed(4)}</div>
                </div>
            `).join('');
        }

        function renderAnswer(data) {
            document.getElementById('answer').textContent = data.answer;

            const sourcesDiv = document.getElementById('sources');
            const sourcesList = document.getElementById('sourcesList');

            if (data.sources && data.sources.length > 0) {
                sourcesDiv.style.display = 'block';
                sourcesList.innerHTML = data.sources.map((s, i) => `
                    <div class="source-item">
                        <span class="source-num">[${i + 1}]</span>
                        <span>${truncate(s.text_zh, 80)} — ${truncate(s.source, 25)}</span>
                    </div>
                `).join('');
            }
        }

        function truncate(str, len) {
            if (!str) return '';
            return str.length > len ? str.slice(0, len) + '...' : str;
        }
    </script>
</body>
</html>
