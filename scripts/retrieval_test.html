<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG 检索测试 - 精排前后对比</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .search-box {
            text-align: center;
            margin-bottom: 30px;
        }
        .search-box input {
            width: 100%;
            max-width: 600px;
            padding: 15px 20px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 25px;
            outline: none;
        }
        .search-box input:focus {
            border-color: #2C3E50;
        }
        .search-box button {
            padding: 15px 30px;
            font-size: 18px;
            background: #2C3E50;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            margin-left: 10px;
        }
        .search-box button:hover {
            background: #34495E;
        }
        .comparison-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        @media (max-width: 900px) {
            .comparison-container {
                grid-template-columns: 1fr;
            }
        }
        .result-panel {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }
        .panel-title {
            font-size: 1.2em;
            font-weight: bold;
        }
        .panel-title.before { color: #E74C3C; }
        .panel-title.after { color: #27AE60; }
        .result-item {
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        .result-header {
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .result-header.before { background: #FDEDEC; }
        .result-header.after { background: #E8F8F0; }
        .rank {
            font-weight: bold;
            font-size: 1.1em;
        }
        .rank-change {
            font-size: 0.85em;
            padding: 3px 8px;
            border-radius: 12px;
        }
        .rank-change.up { background: #27AE60; color: white; }
        .rank-change.down { background: #E74C3C; color: white; }
        .rank-change.same { background: #95A5A6; color: white; }
        .scores {
            font-size: 0.85em;
            color: #666;
        }
        .result-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }
        .lang-section {
            padding: 12px;
        }
        .lang-section.english {
            background: #fafafa;
            border-right: 1px solid #e0e0e0;
        }
        .lang-section.chinese {
            background: #f0f7ff;
        }
        .lang-label {
            font-weight: bold;
            font-size: 0.75em;
            margin-bottom: 5px;
            color: #666;
        }
        .text {
            font-size: 0.9em;
            color: #333;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .chinese .text {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        .source {
            font-size: 0.8em;
            color: #888;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #eee;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2C3E50;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .instructions {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 0.95em;
        }
        .instructions strong {
            color: #2C3E50;
        }
    </style>
</head>
<body>
    <h1>🔍 RAG 检索测试 - 精排前后对比</h1>

    <div class="instructions">
        输入查询问题，对比 <strong>RRF融合检索</strong> 与 <strong>重排后</strong> 的结果差异
    </div>

    <div class="search-box">
        <input type="text" id="queryInput" placeholder="输入查询问题，如：什么是哲学咨询？">
        <button onclick="performSearch()">搜索</button>
    </div>

    <div id="loading" class="loading" style="display: none;">
        <div class="spinner"></div>
        检索中...
    </div>

    <div id="results" class="comparison-container" style="display: none;">
        <div class="result-panel">
            <div class="panel-header">
                <span class="panel-title before">🔴 RRF融合检索 (原始)</span>
                <span id="beforeCount" class="scores"></span>
            </div>
            <div id="beforeResults"></div>
        </div>
        <div class="result-panel">
            <div class="panel-header">
                <span class="panel-title after">🟢 BGE-Reranker 精排后</span>
                <span id="afterCount" class="scores"></span>
            </div>
            <div id="afterResults"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';

        async function performSearch() {
            const query = document.getElementById('queryInput').value.trim();
            if (!query) return;

            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').style.display = 'none';

            try {
                const response = await fetch(`${API_BASE}/api/retrieve/compare`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });

                if (!response.ok) throw new Error('API error');
                const data = await response.json();
                displayResults(data);
            } catch (error) {
                alert('检索失败: ' + error.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function displayResults(data) {
            document.getElementById('results').style.display = 'grid';
            document.getElementById('beforeCount').textContent = `${data.before_rerank.length} 条结果`;
            document.getElementById('afterCount').textContent = `${data.after_rerank.length} 条结果`;

            // Build before results
            const beforeHtml = data.before_rerank.map((item, i) => {
                const zhShort = item.text_zh.length > 150 ? item.text_zh.substring(0, 150) + '...' : item.text_zh;
                const enShort = item.text_en.length > 150 ? item.text_en.substring(0, 150) + '...' : item.text_en;
                return `
                    <div class="result-item">
                        <div class="result-header before">
                            <span class="rank">#${item.rank}</span>
                            <span class="scores">Score: ${item.score.toFixed(4)}</span>
                        </div>
                        <div class="result-content">
                            <div class="lang-section english">
                                <div class="lang-label">🇬🇧 English</div>
                                <div class="text">${escapeHtml(enShort)}</div>
                            </div>
                            <div class="lang-section chinese">
                                <div class="lang-label">🇨🇳 中文</div>
                                <div class="text">${escapeHtml(zhShort)}</div>
                            </div>
                        </div>
                        <div class="source">来源: ${item.source}</div>
                    </div>
                `;
            }).join('');

            // Build after results
            const afterHtml = data.after_rerank.map((item, i) => {
                const zhShort = item.text_zh.length > 150 ? item.text_zh.substring(0, 150) + '...' : item.text_zh;
                const enShort = item.text_en.length > 150 ? item.text_en.substring(0, 150) + '...' : item.text_en;
                const originalRank = item.original_rank;
                let rankChange = '';
                if (originalRank > 0 && originalRank !== item.rank) {
                    const diff = originalRank - item.rank;
                    if (diff > 0) {
                        rankChange = `<span class="rank-change up">↑ ${diff}</span>`;
                    } else {
                        rankChange = `<span class="rank-change down">↓ ${Math.abs(diff)}</span>`;
                    }
                } else {
                    rankChange = `<span class="rank-change same">—</span>`;
                }
                return `
                    <div class="result-item">
                        <div class="result-header after">
                            <span class="rank">#${item.rank} ${rankChange}</span>
                            <span class="scores">Rerank: ${item.rerank_score.toFixed(4)}</span>
                        </div>
                        <div class="result-content">
                            <div class="lang-section english">
                                <div class="lang-label">🇬🇧 English</div>
                                <div class="text">${escapeHtml(enShort)}</div>
                            </div>
                            <div class="lang-section chinese">
                                <div class="lang-label">🇨🇳 中文</div>
                                <div class="text">${escapeHtml(zhShort)}</div>
                            </div>
                        </div>
                        <div class="source">来源: ${item.source}</div>
                    </div>
                `;
            }).join('');

            document.getElementById('beforeResults').innerHTML = beforeHtml;
            document.getElementById('afterResults').innerHTML = afterHtml;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Enter key to search
        document.getElementById('queryInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') performSearch();
        });
    </script>
</body>
</html>
